<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slotify</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="bg-glow"></div>
    <div class="container">

      <div class="header">
        <div class="logo-wrap">
          <div class="logo-glow"></div>
          <img src="icons/icon48.png" alt="Slotify" class="icon" />
        </div>
        <div class="header-text">
          <h1>Slotify</h1>
          <p class="tagline">Timetable → Calendar, instantly</p>
        </div>
      </div>

      <div class="card">
        <div id="status-box" class="status hidden"></div>

        <button id="export-btn" class="btn btn-primary">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
            <path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/>
          </svg>
          <span id="btn-text">Export to Google Calendar</span>
          <div class="btn-shine"></div>
        </button>

        <button id="pdf-btn" class="btn btn-outline">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/>
            <polyline points="9 15 12 18 15 15"/>
          </svg>
          <span id="pdf-btn-text">Download PDF Timetable</span>
        </button>
      </div>

      <p class="hint">Open <strong>timetable.iitr.ac.in</strong> and make sure your timetable is visible.</p>

    </div>
    <script src="popup.js"></script>
  </body>
</html>
